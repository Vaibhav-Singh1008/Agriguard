<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AgriGuard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <h2>AgriGuard</h2>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#features">Features</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="index.html#contact">Contact</a></li>
        </ul>
    </nav>

    <div class="dashboard-container">
        <h1 class="dash-title">Farmer Dashboard</h1>
        
        <div class="dash-grid">
            <div class="dash-card">
                <h2>Upload Crop Image</h2>
                <div class="upload-box">
                    <span>Click to Upload Image</span>
                    <input type="file" id="file-input" style="display: none;">
                </div>
                <button class="predict-btn">Check Disease</button>
            </div>

            <div class="dash-card">
                <h2>AI Soil Advisor</h2>
                <form class="soil-form">
                    <label>Upload Soil Photo (Optional)</label>
                    <input type="file" id="soil-image">
                    <label>Select Language / भाषा</label>
                    <select id="lang-select">
                        <option value="en">English</option>
                        <option value="hi">हिंदी</option>
                    </select>
                    <label>Previous Crop Grown</label>
                    <input type="text" id="prev-crop" placeholder="e.g., Wheat, Sugarcane, Rice">
                    
                    <label>Soil Type</label>
                    <select id="soil-type">
                        <option value="loam">Loam (Dumat Mitti)</option>
                        <option value="clay">Clay (Chikni Mitti)</option>
                        <option value="sandy">Sandy (Retili Mitti)</option>
                        <option value="black">Black (Kali Mitti)</option>
                    </select>
                    
                    <button type="button" class="predict-btn" id="ai-btn">Get AI Advice</button>

                    <div class="ai-chat-box" id="ai-response" style="display: none;">
                        <h4>🤖 AI Suggestion:</h4>
                        <p id="ai-text"></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
