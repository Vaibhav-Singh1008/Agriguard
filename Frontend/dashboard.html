<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriGuard | Farmer Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">AgriGuard</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#features">Features</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="about.html">About Us</a></li>
        </ul>
    </nav>

    <main class="dashboard-wrapper">
        <h1 class="page-title">Farmer Dashboard</h1>

        <section class="glass-panel chatbot-container">
            <div class="panel-header">
                <div class="header-left">
                    <div class="bot-icon">
                        <img src="chatbot.png" alt="AI Bot">
                    </div>
                    <h3>AgriGuard AI Assistant</h3>
                </div>
            </div>
            
            <div class="chat-window" id="chatWindow">
                <div class="message ai-msg">
                    Hello! How can I help you?
                </div>
            </div>

            <form class="chat-input-area" id="chatForm">
                <label for="chatImageUpload" class="btn-upload">📎</label>
                <input type="file" id="chatImageUpload" accept="image/*" style="display: none;">
                <input type="text" id="userInput" placeholder="Type your question here...">
                <button type="submit" class="btn-send">Send</button>
            </form>
        </section>

        <section class="glass-panel soil-advisor-container">
            <div class="panel-header">
                <h3>AI Soil Advisor</h3>
            </div>
            
            <form id="advisorForm" class="vertical-form">
                <div class="form-grid">
                    <div class="input-group">
                        <label>Upload Soil Photo (Optional)</label>
                        <input type="file" id="soilPhoto" class="form-control">
                    </div>

                    <div class="input-group">
                        <label>Select Language / भाषा</label>
                        <select class="form-control">
                            <option>English</option>
                            <option>Hindi</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>Previous Crop Grown</label>
                        <input type="text" placeholder="e.g., Wheat, Sugarcane" class="form-control">
                    </div>

                    <div class="input-group">
                        <label>Soil Type</label>
                        <select class="form-control">
                            <option>Loam (Dumat Mitti)</option>
                            <option>Clay (Chikni Mitti)</option>
                            <option>Sandy (Retili Mitti)</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn-primary full-width">Get AI Advice</button>
            </form>

            <div id="aiResultBox" class="result-box" style="display: none;">
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
